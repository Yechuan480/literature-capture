<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>表格校对 · Literature</title>
    <link rel="stylesheet" href="/static/css/app.css" />
    <link rel="stylesheet" href="/static/css/shell.css" />
    <link rel="stylesheet" href="/static/css/review.css" />
  </head>
  <body class="review-page">
    <header class="review-header">
      <div class="rh-left">
        <a class="brand" href="/">← 文库</a>
        <a class="brand" href="/capture">截取</a>
        <h1>表格校对</h1>
        <p class="hint">Y/1 通过 · N/2 不通过 · Tab 下一项 · Shift+Tab 上一项 · S 跳过 · R 重提</p>
      </div>
      <div class="rh-stats" id="stats-bar">
        <span class="stat"><b id="st-remaining">—</b> 待校对</span>
        <span class="stat ok"><b id="st-passed">—</b> 已通过</span>
        <span class="stat warn"><b id="st-failed">—</b> 未通过</span>
        <span class="stat"><b id="st-papers">—</b> 文献完成</span>
      </div>
    </header>

    <div class="review-layout">
      <aside class="review-sidebar">
        <div class="panel-header">
          <h2>校对队列</h2>
          <p id="queue-hint" class="hint">加载中…</p>
        </div>
        <div class="filter-chips" id="queue-filter-chips" role="group" aria-label="队列状态筛选">
          <button type="button" class="chip active" data-filter="todo" title="待校对 + 未通过">待办</button>
          <button type="button" class="chip" data-filter="failed" title="仅未通过">未通过</button>
          <button type="button" class="chip" data-filter="pending" title="仅待校对">待校对</button>
          <button type="button" class="chip" data-filter="passed" title="仅已通过">已通过</button>
          <button type="button" class="chip" data-filter="all" title="全部状态">全部</button>
        </div>
        <ul class="queue-list" id="queue-list"></ul>
      </aside>

      <main class="review-main" id="review-main">
        <div class="empty-state" id="empty-state">
          <h2>没有待校对的表格</h2>
          <p>所有已截取表格均已通过，或尚无截图。请先在主页框选提取。</p>
          <a class="primary-link" href="/capture">返回表格截取</a>
        </div>

        <div class="review-work" id="review-work" hidden>
          <div class="work-meta">
            <div class="work-meta-text">
              <div class="work-title" id="work-title">—</div>
              <div class="work-sub" id="work-sub">—</div>
            </div>
            <div class="work-badges">
              <span class="badge" id="badge-status">pending</span>
              <span class="badge" id="badge-engine">—</span>
              <span class="badge" id="badge-size">—</span>
            </div>
          </div>

          <div class="compare-grid">
            <section class="pane pane-png">
              <div class="pane-head">
                <h3>原图截图</h3>
                <a id="png-open" href="#" target="_blank" rel="noopener">新窗口</a>
              </div>
              <div class="png-wrap">
                <img id="png-img" alt="table capture" />
              </div>
            </section>
            <section class="pane pane-table">
              <div class="pane-head">
                <h3>提取结果</h3>
                <div class="pane-links">
                  <a id="csv-link" href="#" target="_blank" rel="noopener">CSV</a>
                  <a id="xlsx-link" href="#" target="_blank" rel="noopener">Excel</a>
                </div>
              </div>
              <div class="table-wrap" id="table-wrap">
                <div class="empty">加载中…</div>
              </div>
              <div class="warn-box" id="warn-box" hidden></div>
            </section>
          </div>

          <div class="review-actions">
            <div class="verdict-block">
              <button type="button" class="btn-pass" id="btn-pass">✓ 通过</button>
              <button type="button" class="btn-fail" id="btn-fail">✗ 不通过</button>
              <button type="button" class="ghost btn-skip" id="btn-skip">跳过</button>
              <input
                type="text"
                id="review-note"
                class="note-inline"
                placeholder="备注（可选）"
                autocomplete="off"
              />
            </div>
            <details class="retry-compact" id="retry-block">
              <summary title="一般筛「未通过」后批量处理即可">重提</summary>
              <div class="retry-body">
                <select id="strategy-select" title="重提策略">
                  <option value="ai" selected>仅 AI 视觉</option>
                  <option value="auto">自动（img2table → RapidOCR）</option>
                  <option value="tesseract">img2table + Tesseract</option>
                  <option value="rapidocr">RapidOCR 粗网格</option>
                  <option value="tesseract_ai">img2table + AI 增强</option>
                  <option value="rapidocr_ai">RapidOCR + AI 增强</option>
                </select>
                <button type="button" class="primary sm" id="btn-reextract">重提此项</button>
                <span class="hint" id="retry-hint">筛「未通过」后逐项处理；重提后回待校对</span>
              </div>
            </details>
          </div>
        </div>
      </main>
    </div>

    <div id="toast" class="toast" hidden></div>
    <div id="loading-mask" class="loading-mask">处理中…</div>

    <script src="/static/js/shell.js"></script>
    <script src="/static/js/review.js"></script>
  </body>
</html>
