<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>文库 · Literature</title>
    <link rel="stylesheet" href="/static/css/app.css" />
    <link rel="stylesheet" href="/static/css/shell.css" />
    <link rel="stylesheet" href="/static/css/library.css" />
  </head>
  <body class="library-page">
    <div class="library-layout">
      <aside class="library-collections">
        <div class="panel-header">
          <h2>集合</h2>
          <p class="col-hint">拖文献到自定义集合，或右侧勾选</p>
        </div>
        <ul class="col-list" id="col-list"></ul>
        <div class="col-actions">
          <input type="text" id="new-col-name" placeholder="新集合名称…" maxlength="40" />
          <button type="button" id="btn-add-col" title="新建集合">+</button>
        </div>
        <div class="col-actions col-assign">
          <button type="button" id="btn-assign-all" class="ghost sm" title="将 pdfs/ 中全部文献归入所选自定义集合">
            全部归入所选
          </button>
        </div>
      </aside>

      <section class="library-main">
        <div class="library-toolbar">
          <input
            type="search"
            id="lib-search"
            placeholder="搜索标题 / 文件名 / 标签 / DOI…"
            autocomplete="off"
            spellcheck="false"
          />
          <button type="button" id="btn-today" title="Google 学术今日待读">
            今日待读 <span class="badge-n" id="today-badge" hidden>0</span>
          </button>
          <button type="button" id="btn-sync" title="重新扫描 pdfs/">同步</button>
          <span class="hint" id="lib-count">—</span>
        </div>
        <div class="item-table-wrap">
          <table class="item-table">
            <thead>
              <tr>
                <th style="width: 3.2rem">状态</th>
                <th>标题</th>
                <th style="width: 4.2rem">截取</th>
                <th style="width: 3.6rem">校对</th>
                <th style="width: 5.5rem">文件</th>
              </tr>
            </thead>
            <tbody id="item-tbody">
              <tr>
                <td colspan="5" class="empty" style="text-align: center; color: var(--muted); padding: 2rem">
                  加载中…
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>

      <aside class="library-detail" id="detail-panel">
        <div class="panel-header">
          <h2>详情</h2>
        </div>
        <div class="detail-body" id="detail-body">
          <div class="empty">选择一篇文献</div>
        </div>
      </aside>
    </div>

    <div class="modal-backdrop" id="today-modal" hidden>
      <div class="modal-card" role="dialog" aria-labelledby="today-title">
        <div class="modal-head">
          <h2 id="today-title">今日待读</h2>
          <button type="button" class="ghost" id="btn-today-close">关闭</button>
        </div>
        <p class="modal-lead" id="today-lead">
          来自 Google 学术邮件推送。勾选后可保留并尝试 OA 下载 PDF（不绕过付费墙）。
        </p>
        <div class="modal-actions">
          <button type="button" id="btn-today-refresh">刷新邮件</button>
          <button type="button" id="btn-today-all">全选</button>
          <button type="button" id="btn-today-invert">反选</button>
          <button type="button" class="primary" id="btn-today-keep">保留并下载</button>
          <button type="button" id="btn-today-dismiss">忽略所选</button>
          <button type="button" id="btn-today-delete" title="从列表中删除所选（不删已下载 PDF）">删除所选</button>
        </div>
        <div class="today-list" id="today-list">
          <div class="empty">加载中…</div>
        </div>
        <div class="modal-status" id="today-status"></div>
      </div>
    </div>

    <script src="/static/js/shell.js"></script>
    <script src="/static/js/library.js"></script>
  </body>
</html>
