<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>阅读 · Literature</title>
    <link rel="stylesheet" href="/static/css/app.css" />
    <link rel="stylesheet" href="/static/css/shell.css" />
    <link rel="stylesheet" href="/static/css/reader.css" />
  </head>
  <body class="reader-page">
    <div class="reader-toolbar" id="reader-toolbar" hidden>
      <div class="tb-group" role="group" aria-label="翻页">
        <button type="button" id="btn-prev" title="上一页">‹</button>
        <div class="page-control">
          <input type="number" id="page-input" min="1" value="1" />
          <span id="page-total" class="hint">/ 0</span>
        </div>
        <button type="button" id="btn-next" title="下一页">›</button>
      </div>
      <div class="tb-divider" aria-hidden="true"></div>
      <div class="tb-group" role="group" aria-label="缩放">
        <button type="button" id="btn-zoom-out" title="缩小">−</button>
        <span id="zoom-label" class="badge">125%</span>
        <button type="button" id="btn-zoom-in" title="放大">+</button>
      </div>
      <div class="tb-divider" aria-hidden="true"></div>
      <div class="tb-group" role="group" aria-label="旋转">
        <button type="button" id="btn-rotate-ccw" title="逆时针">↺</button>
        <span id="rotation-label" class="badge">0°</span>
        <button type="button" id="btn-rotate-cw" title="顺时针">↻</button>
      </div>
      <div class="tb-divider" aria-hidden="true"></div>
      <div class="tb-group">
        <button type="button" id="btn-to-capture">截取表格</button>
        <button type="button" id="btn-mark-reading">标为在读</button>
        <button type="button" id="btn-mark-done">标为已读</button>
      </div>
      <span class="reader-title" id="reader-title">—</span>
    </div>

    <div class="reader-empty" id="reader-empty">
      <h2>选择一篇文献开始阅读</h2>
      <p>从<a href="/">文库</a>双击打开，或在地址栏使用 <code>/read?f=文件名.pdf</code></p>
    </div>

    <div class="reader-stage-wrap" id="reader-stage-wrap" hidden>
      <div class="reader-stage" id="reader-stage">
        <canvas id="pdf-canvas"></canvas>
        <div id="highlight-layer" aria-hidden="true"></div>
        <div id="loading-mask" class="loading-mask">加载中…</div>
      </div>
    </div>

    <div class="reader-status" id="status-text">就绪</div>

    <script src="/static/js/shell.js"></script>
    <script src="/static/js/pdf_viewer.js"></script>
    <script src="/static/js/reader.js"></script>
  </body>
</html>
