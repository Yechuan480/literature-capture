<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>设置 · Literature</title>
    <link rel="stylesheet" href="/static/css/app.css" />
    <link rel="stylesheet" href="/static/css/shell.css" />
    <style>
      .settings-page {
        max-width: 40rem;
        margin: 0 auto;
        padding: 1.25rem 1rem 3rem;
      }
      .settings-page h1 {
        font-size: 1.15rem;
        margin: 0 0 0.35rem;
      }
      .settings-page .lead {
        color: var(--muted);
        font-size: 0.82rem;
        margin: 0 0 1.25rem;
      }
      .settings-card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 0.9rem 1rem;
        margin-bottom: 0.85rem;
      }
      .settings-card h2 {
        margin: 0 0 0.45rem;
        font-size: 0.92rem;
      }
      .settings-card p {
        margin: 0;
        font-size: 0.78rem;
        color: var(--muted);
        line-height: 1.45;
      }
      .settings-card a {
        color: var(--accent);
      }
      .settings-form {
        display: flex;
        flex-direction: column;
        gap: 0.55rem;
        margin-top: 0.65rem;
      }
      .settings-form .field {
        display: flex;
        flex-direction: column;
        gap: 0.2rem;
        font-size: 0.78rem;
        color: var(--muted);
      }
      .settings-form .field input {
        background: var(--bg);
        border: 1px solid var(--border);
        color: var(--text);
        border-radius: 7px;
        padding: 0.4rem 0.55rem;
        font-size: 0.82rem;
      }
      .settings-form .field-check {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        font-size: 0.8rem;
        color: var(--text);
      }
      .settings-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
        margin-top: 0.35rem;
      }
      .settings-msg {
        font-size: 0.75rem;
        color: var(--muted);
        min-height: 1.2em;
      }
      .settings-msg.ok {
        color: var(--ok);
      }
      .settings-msg.warn {
        color: var(--warn);
      }
      .field-row {
        display: grid;
        grid-template-columns: 1fr 6rem;
        gap: 0.5rem;
      }
    </style>
  </head>
  <body>
    <div class="settings-page">
      <h1>设置</h1>
      <p class="lead">
        AI 与邮箱凭据仅保存在本机 <code>data/</code>，不会提交到 Git。
      </p>

      <section class="settings-card">
        <h2>AI（视觉提取 · 聊天 · 翻译）</h2>
        <p>OpenAI 兼容接口；Key 存 <code>data/ai_settings.json</code>。</p>
        <div class="settings-form">
          <label class="field-check">
            <input type="checkbox" id="ai-enabled" /> 启用 AI
          </label>
          <label class="field">
            <span>Base URL</span>
            <input type="text" id="ai-base-url" placeholder="https://api.openai.com/v1" spellcheck="false" />
          </label>
          <label class="field">
            <span>Model</span>
            <input type="text" id="ai-model" placeholder="gpt-4o" spellcheck="false" />
          </label>
          <label class="field">
            <span>API Key</span>
            <input type="password" id="ai-api-key" placeholder="sk-…（留空表示保持不变）" autocomplete="off" spellcheck="false" />
          </label>
          <label class="field-check">
            <input type="checkbox" id="ai-show-key" /> 显示 Key
          </label>
          <label class="field-check">
            <input type="checkbox" id="ai-clear-key" /> 清除已保存的 Key
          </label>
          <div class="settings-actions">
            <button type="button" class="primary" id="btn-ai-save">保存</button>
            <button type="button" id="btn-ai-test">测试连接</button>
          </div>
          <div id="ai-settings-msg" class="settings-msg"></div>
        </div>
      </section>

      <section class="settings-card">
        <h2>邮箱 · Google 学术推送</h2>
        <p>
          通过 IMAP 读取 Scholar Alert（默认 Gmail
          <code>imap.gmail.com:993</code> +
          <strong>应用专用密码</strong>）。仅用于生成「今日待读」；下载 PDF 只走开放获取链接，不绕过付费墙。
        </p>
        <div class="settings-form">
          <label class="field-check">
            <input type="checkbox" id="em-enabled" /> 启用邮箱拉取
          </label>
          <div class="field-row">
            <label class="field">
              <span>IMAP 主机</span>
              <input type="text" id="em-host" placeholder="imap.gmail.com" spellcheck="false" />
            </label>
            <label class="field">
              <span>端口</span>
              <input type="number" id="em-port" value="993" />
            </label>
          </div>
          <label class="field">
            <span>账号（邮箱）</span>
            <input type="email" id="em-user" placeholder="you@gmail.com" autocomplete="username" spellcheck="false" />
          </label>
          <label class="field">
            <span>应用专用密码</span>
            <input type="password" id="em-password" placeholder="16 位应用密码（留空保持不变）" autocomplete="new-password" spellcheck="false" />
          </label>
          <label class="field-check">
            <input type="checkbox" id="em-show-pw" /> 显示密码
          </label>
          <label class="field-check">
            <input type="checkbox" id="em-clear-pw" /> 清除已保存密码
          </label>
          <label class="field">
            <span>文件夹</span>
            <input type="text" id="em-folder" placeholder="INBOX" spellcheck="false" />
          </label>
          <label class="field">
            <span>发件人过滤</span>
            <input type="text" id="em-sender" placeholder="scholaralerts@google.com" spellcheck="false" />
          </label>
          <label class="field-check">
            <input type="checkbox" id="em-ssl" checked /> SSL
          </label>
          <div class="settings-actions">
            <button type="button" class="primary" id="btn-em-save">保存</button>
            <button type="button" id="btn-em-test">测试 IMAP</button>
          </div>
          <div id="em-settings-msg" class="settings-msg"></div>
        </div>
      </section>

      <section class="settings-card">
        <h2>翻译</h2>
        <p>
          目标语言固定为 <strong>zh-CN</strong>。在阅读页使用「框选翻译」或「全文翻译」；译稿保存为
          <code>*.zh-CN.pdf</code>。
        </p>
      </section>

      <section class="settings-card">
        <h2>路径</h2>
        <p id="path-info">加载中…</p>
      </section>
    </div>

    <script src="/static/js/shell.js"></script>
    <script>
      (function () {
        if (window.ShellNav) ShellNav.mount({ active: "settings" });
        const $ = (id) => document.getElementById(id);
        function msg(el, text, kind) {
          el.textContent = text || "";
          el.className = "settings-msg" + (kind ? " " + kind : "");
        }
        async function api(path, options) {
          const res = await fetch(path, options);
          if (!res.ok) {
            let detail = res.statusText;
            try {
              const j = await res.json();
              detail = j.detail || JSON.stringify(j);
            } catch (_) {}
            throw new Error(typeof detail === "string" ? detail : JSON.stringify(detail));
          }
          return res.json();
        }
        async function load() {
          const cfg = await api("/api/config");
          $("path-info").innerHTML = `
            文献根目录：<code>${cfg.literature_root || "—"}</code><br/>
            PDF 目录：<code>${cfg.pdfs_root || "—"}</code><br/>
            截取目录：<code>${cfg.captures_root || "—"}</code>
          `;
          const ai = await api("/api/settings/ai");
          $("ai-enabled").checked = !!ai.enabled;
          $("ai-base-url").value = ai.base_url || "";
          $("ai-model").value = ai.model || "";
          $("ai-api-key").placeholder = ai.has_key || ai.api_key_set
            ? "已保存 Key（留空保持不变）"
            : "sk-…";
          const em = await api("/api/scholar/settings");
          $("em-enabled").checked = !!em.enabled;
          $("em-host").value = em.host || "imap.gmail.com";
          $("em-port").value = em.port || 993;
          $("em-user").value = em.user || "";
          $("em-folder").value = em.folder || "INBOX";
          $("em-sender").value = em.sender_filter || "scholaralerts@google.com";
          $("em-ssl").checked = em.ssl !== false;
          $("em-password").placeholder = em.password_set
            ? "已保存密码（留空保持不变）"
            : "应用专用密码";
        }
        $("ai-show-key").addEventListener("change", () => {
          $("ai-api-key").type = $("ai-show-key").checked ? "text" : "password";
        });
        $("em-show-pw").addEventListener("change", () => {
          $("em-password").type = $("em-show-pw").checked ? "text" : "password";
        });
        $("btn-ai-save").addEventListener("click", async () => {
          const el = $("ai-settings-msg");
          try {
            msg(el, "保存中…");
            const body = {
              enabled: $("ai-enabled").checked,
              base_url: $("ai-base-url").value.trim(),
              model: $("ai-model").value.trim(),
              clear_key: $("ai-clear-key").checked,
            };
            const key = $("ai-api-key").value.trim();
            if (key) body.api_key = key;
            await api("/api/settings/ai", {
              method: "PUT",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(body),
            });
            $("ai-api-key").value = "";
            $("ai-clear-key").checked = false;
            msg(el, "已保存", "ok");
            await load();
          } catch (e) {
            msg(el, e.message, "warn");
          }
        });
        $("btn-ai-test").addEventListener("click", async () => {
          const el = $("ai-settings-msg");
          try {
            msg(el, "测试中…");
            const r = await api("/api/settings/ai/test", { method: "POST" });
            const t = r.test || r;
            const ok = !!(t.ok ?? r.ready);
            msg(el, t.message || (ok ? "连接成功" : "失败"), ok ? "ok" : "warn");
          } catch (e) {
            msg(el, e.message, "warn");
          }
        });
        $("btn-em-save").addEventListener("click", async () => {
          const el = $("em-settings-msg");
          try {
            msg(el, "保存中…");
            const body = {
              enabled: $("em-enabled").checked,
              host: $("em-host").value.trim(),
              port: parseInt($("em-port").value, 10) || 993,
              user: $("em-user").value.trim(),
              folder: $("em-folder").value.trim() || "INBOX",
              sender_filter: $("em-sender").value.trim(),
              ssl: $("em-ssl").checked,
              clear_password: $("em-clear-pw").checked,
            };
            const pw = $("em-password").value.trim();
            if (pw) body.password = pw;
            await api("/api/scholar/settings", {
              method: "PUT",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(body),
            });
            $("em-password").value = "";
            $("em-clear-pw").checked = false;
            msg(el, "已保存", "ok");
            await load();
          } catch (e) {
            msg(el, e.message, "warn");
          }
        });
        $("btn-em-test").addEventListener("click", async () => {
          const el = $("em-settings-msg");
          try {
            msg(el, "测试 IMAP…");
            const r = await api("/api/scholar/settings/test", { method: "POST" });
            const t = r.test || r;
            msg(el, t.message || (t.ok ? "成功" : "失败"), t.ok ? "ok" : "warn");
          } catch (e) {
            msg(el, e.message, "warn");
          }
        });
        load().catch((e) => msg($("ai-settings-msg"), e.message, "warn"));
      })();
    </script>
  </body>
</html>
