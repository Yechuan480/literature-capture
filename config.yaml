# 文献根目录：默认指向本应用的上一级
# 也可写成绝对路径，例如 /Users/book/Desktop/Aqueous literature
literature_root: null
# PDF 存放子目录（相对 literature_root）
pdfs_subdir: pdfs

ocr:
  # auto | img2table_tesseract | rapidocr | ai
  # auto：优先 img2table+Tesseract → RapidOCR（不再默认走 Paddle）
  engine: auto
  lang: eng+chi_sim
  upscale_min_side: 1000

# Paddle/PaddleX 已从默认提取路径移除；检测接口仍可按需启用（体积大，默认关闭）
paddle:
  enabled: false
  device: cpu
  detect_model: PicoDet_layout_1x_table
  recognize_pipeline: table_recognition_v2
  detect_dpi: 150
  min_score: 0.4
  # 全本检测最大页数，0=不限制
  max_detect_pages: 0

ai:
  # 默认关闭；可在网页右侧「AI 设置」启用并填写 Key（保存到 data/ai_settings.json）
  enabled: false
  base_url: https://api.openai.com/v1
  model: gpt-4o
  # 也可放环境变量 LITERATURE_AI_API_KEY 作为初始种子

server:
  host: 127.0.0.1
  port: 8765

# 补充材料（SI）自动获取：打开文献时尝试 DOI → Crossref → 下载开放 SI
si:
  enabled: true
  auto_on_open: true
  user_agent: "literature-capture/1.3 (local research tool; +https://github.com/Yechuan480/literature-capture)"
  request_timeout_s: 30
  max_file_mb: 80
  min_interval_ms: 800
  max_concurrent_jobs: 2
  max_files_per_paper: 15
  # Crossref 礼貌池邮箱（可选）：也可设环境变量 LITERATURE_SI_CROSSREF_MAILTO
  crossref_mailto: ""
